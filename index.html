<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Online Store Portfolio</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f7f7f7;
}

header {
    background: #222;
    color: white;
    padding: 15px;
    text-align: center;
}

nav {
    background: #444;
    padding: 10px;
    text-align: center;
}

nav a {
    color: white;
    margin: 10px;
    text-decoration: none;
    font-weight: bold;
}

.container {
    padding: 20px;
}

.products {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
}

.product {
    background: white;
    border-radius: 10px;
    box-shadow: 0 0 10px #ccc;
    width: 250px;
    padding: 15px;
    text-align: center;
}

.product img {
    width: 100%;
    border-radius: 10px;
}

.product h3 {
    margin: 10px 0;
}

.price {
    color: green;
    font-weight: bold;
}

button {
    background: #28a745;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 5px;
    cursor: pointer;
}

footer {
    background: #222;
    color: white;
    text-align: center;
    padding: 10px;
    margin-top: 20px;
}
</style>

</head>
<body>

<header>
<h1>My Online Store</h1>
<p>Welcome to my selling portfolio</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Contact</a>
</nav>

<div class="container">
<h2>Featured Products</h2>

<div class="products">

<div class="product">
<img src="https://via.placeholder.com/250" alt="Product 1">
<h3>Wireless Headphones</h3>
<p class="price">$45</p>
<button>Buy Now</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/250" alt="Product 2">
<h3>Smart Watch</h3>
<p class="price">$60</p>
<button>Buy Now</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/250" alt="Product 3">
<h3>Bluetooth Speaker</h3>
<p class="price">$35</p>
<button>Buy Now</button>
</div>

</div>
</div>

<footer>
<p>© 2026 My Online Store | Contact: your@email.com</p>
</footer>

</body>
</html>
